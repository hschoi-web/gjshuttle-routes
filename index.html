<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>광진구청 동행버스 통합 노선</title>
<meta name="description" content="광진구청 동행버스(1호차·2호차) 노선과 실시간 차량 위치를 한 화면에서 확인하세요.">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="assets/style.css?v=13">
</head>
<body>

<header class="topbar">
  <a href="#" class="brand" id="brandHome" aria-label="첫 화면으로">
    <img src="assets/logo.png?v=1"
         alt="광진구청 동행버스"
         class="brand-logo"
         onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-flex';">
    <span class="brand-fallback" style="display:none" aria-hidden="true">
      <span class="brand-emoji">🚌</span>
      <strong>광진구청 동행버스</strong>
    </span>
    <div class="brand-text">
      <span>광진구청 동행버스 · 통합 노선</span>
    </div>
  </a>
</header>

<div class="layout">
  <nav class="route-tabs" id="routeTabs" aria-label="차량 선택"></nav>
  <main class="map-panel">
    <div class="map-frame-wrap">
      <iframe id="mapFrame"
              title="선택한 노선 지도 / 정류장 / 실시간 차량 관제"
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
              allow="geolocation"
              src="about:blank"></iframe>
    </div>
  </main>
</div>

<footer class="sidebar-foot">
  <small>데이터 출처: <a href="https://rideus.net/page/gjshuttle" target="_blank" rel="noopener">rideus.net/page/gjshuttle</a></small>
</footer>

<template id="tplRouteTab">
  <button class="route-tab" type="button" role="tab" aria-selected="false">
    <span class="tab-emoji" aria-hidden="true">🚌</span>
    <span class="tab-body">
      <span class="tab-name"></span>
      <span class="tab-route"></span>
    </span>
    <a class="tab-open" target="_blank" rel="noopener" title="새 창에서 열기" aria-label="새 창에서 열기">↗</a>
  </button>
</template>

<script src="assets/app.js?v=13" defer></script>
</body>
</html>
